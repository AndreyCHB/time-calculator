<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Time Value Calculator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>
        body {
            background-color: #0f172a;
            color: #e2e8f0;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        .glass-card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 16px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
            transition: transform 0.2s;
        }
        .glass-card:hover { transform: translateY(-2px); }

        .form-label { font-weight: 600; font-size: 0.9rem; color: #94a3b8; margin-bottom: 0.3rem; }
        .input-group-text { background-color: #0f172a; border-color: #334155; color: #64748b; }
        .form-control { background-color: #0f172a !important; border-color: #334155; color: #f8fafc !important; }
        .form-control:focus { border-color: #3b82f6; box-shadow: 0 0 0 0.25rem rgba(59, 130, 246, 0.25); }
        .form-control::placeholder { color: #475569; } /* Видимый серый плейсхолдер */

        .btn-custom-warning { background: linear-gradient(135deg, #f59e0b, #d97706); color: white; border: none; font-weight: 600; border-radius: 8px; }
        .btn-custom-warning:hover { background: linear-gradient(135deg, #d97706, #b45309); color: white; }

        .btn-custom-danger { background: linear-gradient(135deg, #ef4444, #b91c1c); color: white; border: none; font-weight: 600; border-radius: 8px; }
        .btn-custom-danger:hover { background: linear-gradient(135deg, #b91c1c, #991b1b); color: white; }

        .result-box {
            display: none; margin-top: 20px; padding: 15px;
            border-radius: 8px; font-weight: 500; font-size: 1.05rem;
            white-space: pre-wrap; /* Чтобы работали переносы строк \n */
            animation: fadeIn 0.4s ease-in-out;
        }
        .res-success { background-color: rgba(16, 185, 129, 0.1); border-left: 4px solid #10b981; color: #34d399; }
        .res-danger { background-color: rgba(239, 68, 68, 0.1); border-left: 4px solid #ef4444; color: #f87171; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="container mt-5 pb-5">
        <div class="text-center mb-5">
            <h1 class="fw-bold text-white mb-2"><i class="bi bi-hourglass-split text-info"></i> Калькулятор Ценности Времени</h1>
            <p class="text-secondary">Узнайте истинную стоимость вещей и привычек в часах вашей жизни</p>
        </div>

        <div class="row g-4">
            <div class="col-md-6">
                <div class="glass-card p-4 h-100">
                    <h4 class="mb-4" style="color: #fbd38d;"><i class="bi bi-cart3"></i> Цена в часах жизни</h4>

                    <div class="mb-3">
                        <label class="form-label">Что вы хотите купить?</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-box-seam"></i></span>
                            <input type="text" id="itemName" class="form-control" placeholder="Например: iPhone 15 Pro">
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Стоимость вещи (руб)</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-currency-dollar"></i></span>
                            <input type="number" id="itemPrice" class="form-control" placeholder="120000">
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label">Ваш реальный доход в час (руб)</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-person-workspace"></i></span>
                            <input type="number" id="wage1" class="form-control" placeholder="500">
                        </div>
                        <div class="form-text text-secondary" style="font-size: 0.8rem;">Зарплата в месяц ÷ 160 часов</div>
                    </div>

                    <button id="btnItem" onclick="calcItem()" class="btn btn-custom-warning w-100 py-2">
                        <i class="bi bi-calculator"></i> Рассчитать стоимость
                    </button>
                    <div id="resItem" class="result-box res-success"></div>
                </div>
            </div>

            <div class="col-md-6">
                <div class="glass-card p-4 h-100">
                    <h4 class="mb-4" style="color: #feb2b2;"><i class="bi bi-phone-vibrate"></i> Утечка времени</h4>

                    <div class="mb-3">
                        <label class="form-label">Часов в день в соцсетях/играх</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-clock-history"></i></span>
                            <input type="number" id="hoursPhone" class="form-control" placeholder="Например: 3">
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label">Ваш доход в час (руб)</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-cash-stack"></i></span>
                            <input type="number" id="wage2" class="form-control" placeholder="500">
                        </div>
                    </div>

                    <div class="mb-4" style="height: 20px;"></div>

                    <button id="btnWaste" onclick="calcWaste()" class="btn btn-custom-danger w-100 py-2">
                        <i class="bi bi-graph-down-arrow"></i> Оценить потери за год
                    </button>
                    <div id="resWaste" class="result-box res-danger"></div>
                </div>
            </div>
        </div>

        <div class="text-center mt-5">
            <button onclick="getHistory()" class="btn btn-outline-secondary btn-sm"><i class="bi bi-server"></i> Запросить лог с сервера</button>
            <div id="historyBox" class="mt-3 text-start bg-dark p-3 rounded border border-secondary" style="display: none; max-width: 600px; margin: 0 auto; font-size: 0.9rem;"></div>
        </div>
    </div>

    <script>
        async function calcItem() {
            const wageValue = parseFloat(document.getElementById('wage1').value);

            if (!wageValue || wageValue <= 0) {
                alert("Пожалуйста, введите ваш реальный доход (больше нуля)!");
                return;
            }

            const btn = document.getElementById('btnItem');
            btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Считаем...';

            const data = {
                item_name: document.getElementById('itemName').value || "Неизвестно",
                price: parseFloat(document.getElementById('itemPrice').value) || 0,
                hourly_wage: wageValue
            };

            const response = await fetch('/api/calc_item', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });
            const result = await response.json();

            let box = document.getElementById('resItem');
            box.innerText = result.result;
            box.style.display = 'block';
            btn.innerHTML = '<i class="bi bi-calculator"></i> Рассчитать стоимость';
        }

        async function calcWaste() {
            const wageValue = parseFloat(document.getElementById('wage2').value);

            if (!wageValue || wageValue <= 0) {
                alert("Пожалуйста, введите ваш реальный доход (больше нуля)!");
                return;
            }

            const btn = document.getElementById('btnWaste');
            btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Анализируем...';

            const data = {
                hours_per_day: parseFloat(document.getElementById('hoursPhone').value) || 0,
                hourly_wage: wageValue
            };

            const response = await fetch('/api/calc_waste', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });
            const result = await response.json();

            let box = document.getElementById('resWaste');
            box.innerText = result.result;
            box.style.display = 'block';
            btn.innerHTML = '<i class="bi bi-graph-down-arrow"></i> Оценить потери за год';
        }

        async function getHistory() {
            const response = await fetch('/api/history');
            const data = await response.json();
            let box = document.getElementById('historyBox');
            box.innerHTML = '<h6 class="text-muted mb-3"><i class="bi bi-clock"></i> Последние 5 запросов:</h6>';
            if(data.history.length === 0) box.innerHTML += '<p class="text-secondary">История пуста.</p>';

            data.history.forEach(item => {
                box.innerHTML += `<div class="mb-2 pb-2 border-bottom border-secondary"><span class="text-info">[${item.time}]</span> <span class="text-light">${item.result.replace(/\n/g, ' ')}</span></div>`;
            });
            box.style.display = 'block';
        }

        document.addEventListener("DOMContentLoaded", () => {
            const savedWage = localStorage.getItem("userWage");
            if (savedWage) {
                document.getElementById('wage1').value = savedWage;
                document.getElementById('wage2').value = savedWage;
            }

            document.getElementById('wage1').addEventListener('input', (e) => {
                localStorage.setItem("userWage", e.target.value);
                document.getElementById('wage2').value = e.target.value;
            });

            document.getElementById('wage2').addEventListener('input', (e) => {
                localStorage.setItem("userWage", e.target.value);
                document.getElementById('wage1').value = e.target.value;
            });
        });
    </script>
</body>
</html>
